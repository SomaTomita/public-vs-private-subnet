Diagram:
  DefinitionFiles:
    - Type: URL
      Url: "https://raw.githubusercontent.com/awslabs/diagram-as-code/main/definitions/definition-for-aws-icons-light.yaml"

  Resources:
    Canvas:
      Type: AWS::Diagram::Canvas
      Direction: vertical
      Children:
        - ExternalUsers
        - AWSCloud

    ExternalUsers:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - User
        - Attacker

    User:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "User"

    Attacker:
      Type: AWS::Diagram::Resource
      Preset: User
      Title: "Attacker"

    AWSCloud:
      Type: AWS::Diagram::Cloud
      Direction: vertical
      Preset: AWSCloudNoLogo
      Align: center
      Children:
        - Region

    Region:
      Type: AWS::Region
      Title: "ap-northeast-1"
      Direction: vertical
      Children:
        - VPC
        - ServicesStack

    ServicesStack:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - CloudWatch
        - GuardDuty

    VPC:
      Type: AWS::EC2::VPC
      Title: "Config B: Private + ALB (10.0.0.0/16)"
      Direction: vertical
      Children:
        - AZStack
      BorderChildren:
        - Position: N
          Resource: IGW

    AZStack:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - AZ1
        - AZ2

    AZ1:
      Type: AWS::EC2::AvailabilityZone
      Title: "AZ-a"
      Direction: vertical
      Children:
        - PublicSubnet1
        - AppSubnet1
        - DBSubnet1

    PublicSubnet1:
      Type: AWS::EC2::Subnet
      Preset: PublicSubnet
      Title: "Public (10.0.1.0/24)"
      Children:
        - PublicResources1

    PublicResources1:
      Type: AWS::Diagram::HorizontalStack
      Children:
        - ALB
        - NATGateway

    ALB:
      Type: AWS::ElasticLoadBalancingV2::LoadBalancer
      Preset: "Application Load Balancer"
      Title: "ALB"

    NATGateway:
      Type: AWS::EC2::NatGateway
      Title: "NAT GW"

    AppSubnet1:
      Type: AWS::EC2::Subnet
      Preset: PrivateSubnet
      Title: "App Private (10.0.10.0/24)"
      Children:
        - AppServer

    AppServer:
      Type: AWS::EC2::Instance
      Title: "App Server (No Public IP)"

    DBSubnet1:
      Type: AWS::EC2::Subnet
      Preset: PrivateSubnet
      Title: "DB Private (10.0.20.0/24)"
      Children:
        - RDSPrimary

    RDSPrimary:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Relational Database Service (Amazon RDS)"
      Title: "RDS Primary"

    AZ2:
      Type: AWS::EC2::AvailabilityZone
      Title: "AZ-c"
      Direction: vertical
      Children:
        - PublicSubnet2
        - AppSubnet2
        - DBSubnet2

    PublicSubnet2:
      Type: AWS::EC2::Subnet
      Preset: PublicSubnet
      Title: "Public (10.0.3.0/24)"

    AppSubnet2:
      Type: AWS::EC2::Subnet
      Preset: PrivateSubnet
      Title: "App Private (10.0.11.0/24)"

    DBSubnet2:
      Type: AWS::EC2::Subnet
      Preset: PrivateSubnet
      Title: "DB Private (10.0.21.0/24)"
      Children:
        - RDSStandby

    RDSStandby:
      Type: AWS::Diagram::Resource
      Preset: "Amazon Relational Database Service (Amazon RDS)"
      Title: "RDS Standby"

    IGW:
      Type: AWS::EC2::InternetGateway
      Title: "Internet Gateway"
      IconFill:
        Type: rect

    CloudWatch:
      Type: AWS::Diagram::Resource
      Preset: "Amazon CloudWatch"
      Title: "Flow Logs"

    GuardDuty:
      Type: AWS::Diagram::Resource
      Preset: "Amazon GuardDuty"
      Title: "GuardDuty"

  Links:
    - Source: User
      SourcePosition: S
      Target: IGW
      TargetPosition: NNW
      TargetArrowHead:
        Type: Open

    - Source: Attacker
      SourcePosition: S
      Target: IGW
      TargetPosition: NNE
      TargetArrowHead:
        Type: Open
      LineColor: "rgba(255,0,0,255)"

    - Source: IGW
      SourcePosition: S
      Target: ALB
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: ALB
      SourcePosition: S
      Target: AppServer
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: AppServer
      SourcePosition: S
      Target: RDSPrimary
      TargetPosition: N
      TargetArrowHead:
        Type: Open

    - Source: AppServer
      SourcePosition: NE
      Target: NATGateway
      TargetPosition: S
      TargetArrowHead:
        Type: Open

    - Source: RDSPrimary
      SourcePosition: E
      Target: RDSStandby
      TargetPosition: W
      TargetArrowHead:
        Type: Open
